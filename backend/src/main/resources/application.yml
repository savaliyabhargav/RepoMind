server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: repomind

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:repomind}
    username: ${DB_USERNAME:repomind}
    password: ${DB_PASSWORD:repomind123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy}
            scope: read:user,user:email

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
